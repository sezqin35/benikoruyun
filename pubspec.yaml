name: safenow
description: Beni Koruyun - Acil Durum Uygulaması

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  geolocator: ^13.0.1
  google_sign_in: ^6.2.1
  geocoding: ^3.0.0
  url_launcher: ^6.3.0
  shared_preferences: ^2.3.2
  permission_handler: ^11.3.1
  flutter_contacts: ^1.1.9+2
  cupertino_icons: ^1.0.8
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.2
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  firebase_storage: ^12.4.10
  record: ^6.2.0
  audioplayers: ^6.6.0
  dio: ^5.9.2
  google_mobile_ads: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.png"
